<!DOCTYPE html>
<html>
<head>
<title>Website Chat</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
body{
font-family:Arial;
text-align:center;
background:#111;
color:white;
}

#chat{
width:350px;
height:250px;
margin:auto;
border:1px solid white;
overflow-y:auto;
padding:10px;
background:#222;
}

input,button{
margin:5px;
padding:8px;
}
</style>
</head>

<body>

<h2>Chat</h2>

<p>Your Code: <span id="myCode"></span></p>

<input id="friendCode" placeholder="Friend code">

<div id="chat"></div>

<input id="message" placeholder="Message">
<button onclick="send()">Send</button>

<script>

// RANDOM USER CODE
let myCode = localStorage.getItem("myCode")

if(!myCode){
myCode = Math.floor(100000 + Math.random()*900000)
localStorage.setItem("myCode",myCode)
}

document.getElementById("myCode").innerText = myCode


// FIREBASE CONFIG
const firebaseConfig = {
apiKey: "AIzaSyBeQR-07p_gkN1ygr49rh-PSI-pRsdmoDw",
authDomain: "chat-82a4b.firebaseapp.com",
databaseURL: "https://chat-82a4b-default-rtdb.firebaseio.com",
projectId: "chat-82a4b",
};

firebase.initializeApp(firebaseConfig)

const db = firebase.database()


function chatID(a,b){
return [a,b].sort().join("_")
}


// SEND MESSAGE
function send(){

let friend = document.getElementById("friendCode").value
let msg = document.getElementById("message").value

if(friend=="" || msg=="") return

db.ref("chats/"+chatID(myCode,friend)).push({
sender: myCode,
text: msg,
time: Date.now()
})

document.getElementById("message").value=""

}


// LOAD CHAT
function load(){

let friend = document.getElementById("friendCode").value

if(friend=="") return

db.ref("chats/"+chatID(myCode,friend))
.on("value",snap=>{

let chat = document.getElementById("chat")
chat.innerHTML=""

snap.forEach(m=>{

let data = m.val()

chat.innerHTML += "<p><b>"+data.sender+":</b> "+data.text+"</p>"

})

})

}

setInterval(load,1000)

</script>

</body>
</html>
