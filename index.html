<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus Chat - Modern Messaging</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --secondary: #ec4899;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --bg-dark: #0f172a;
      --bg-darker: #0a0e27;
      --bg-card: #1e293b;
      --bg-hover: #334155;
      --text-primary: #f1f5f9;
      --text-secondary: #cbd5e1;
      --text-muted: #94a3b8;
      --border: #334155;
      --shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, var(--bg-darker) 0%, var(--bg-dark) 100%);
      color: var(--text-primary);
      overflow: hidden;
      height: 100vh;
    }

    .app-container {
      display: flex;
      height: 100vh;
      background: var(--bg-dark);
    }

    /* Auth Screen */
    .auth-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    .auth-card {
      background: var(--bg-card);
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .auth-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .auth-header h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .auth-header p {
      color: var(--text-muted);
      font-size: 14px;
    }

    .auth-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 25px;
      background: var(--bg-hover);
      padding: 4px;
      border-radius: 10px;
    }

    .auth-tab {
      flex: 1;
      padding: 10px;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      border-radius: 8px;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .auth-tab.active {
      background: var(--primary);
      color: white;
    }

    .auth-form {
      display: none;
    }

    .auth-form.active {
      display: block;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 16px;
      background: var(--bg-hover);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-primary);
      font-size: 14px;
      transition: all 0.3s ease;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--primary);
      background: rgba(99, 102, 241, 0.1);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
    }

    .form-error {
      color: var(--danger);
      font-size: 12px;
      margin-top: 6px;
      display: none;
    }

    .btn {
      width: 100%;
      padding: 12px 16px;
      border: none;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
    }

    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    /* Main Chat Layout */
    .chat-layout {
      display: flex;
      width: 100%;
      height: 100%;
    }

    .sidebar {
      width: 320px;
      background: var(--bg-card);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .sidebar-title {
      font-size: 24px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .sidebar-actions {
      display: flex;
      gap: 8px;
    }

    .icon-btn {
      width: 36px;
      height: 36px;
      border: none;
      background: var(--bg-hover);
      border-radius: 8px;
      color: var(--text-primary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      font-size: 16px;
    }

    .icon-btn:hover {
      background: var(--primary);
      transform: scale(1.05);
    }

    .search-box {
      padding: 12px 16px;
      margin: 12px;
      background: var(--bg-hover);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-primary);
      font-size: 14px;
    }

    .search-box::placeholder {
      color: var(--text-muted);
    }

    .chat-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .chat-item {
      padding: 12px;
      margin-bottom: 8px;
      background: var(--bg-hover);
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      border: 2px solid transparent;
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .chat-item:hover {
      background: rgba(99, 102, 241, 0.1);
      border-color: var(--primary);
    }

    .chat-item.active {
      background: rgba(99, 102, 241, 0.2);
      border-color: var(--primary);
    }

    .chat-avatar {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 18px;
      color: white;
      flex-shrink: 0;
    }

    .chat-info {
      flex: 1;
      min-width: 0;
    }

    .chat-name {
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chat-preview {
      font-size: 12px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chat-badge {
      background: var(--primary);
      color: white;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      flex-shrink: 0;
    }

    /* Chat Area */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg-dark);
    }

    .chat-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--bg-card);
    }

    .chat-header-info {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .chat-header-text h2 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 2px;
    }

    .chat-header-text p {
      font-size: 12px;
      color: var(--text-muted);
    }

    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message-group {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }

    .message-group.own {
      justify-content: flex-end;
    }

    .message-bubble {
      max-width: 60%;
      padding: 12px 16px;
      border-radius: 12px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      word-wrap: break-word;
    }

    .message-group.own .message-bubble {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border: none;
      color: white;
    }

    .message-sender {
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 4px;
      font-weight: 600;
    }

    .message-text {
      font-size: 14px;
      line-height: 1.4;
      margin-bottom: 4px;
    }

    .message-time {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .message-status {
      font-size: 11px;
      color: var(--success);
      margin-left: 4px;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-muted);
      text-align: center;
    }

    .empty-state-icon {
      font-size: 64px;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    .empty-state h3 {
      font-size: 18px;
      margin-bottom: 8px;
      color: var(--text-secondary);
    }

    .empty-state p {
      font-size: 14px;
      max-width: 300px;
    }

    /* Input Area */
    .input-area {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      background: var(--bg-card);
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }

    .input-wrapper {
      flex: 1;
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    .message-input {
      flex: 1;
      padding: 12px 16px;
      background: var(--bg-hover);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-primary);
      font-size: 14px;
      resize: none;
      max-height: 100px;
      font-family: inherit;
      transition: all 0.3s ease;
    }

    .message-input:focus {
      outline: none;
      border-color: var(--primary);
      background: rgba(99, 102, 241, 0.1);
    }

    .send-btn {
      width: 40px;
      height: 40px;
      border: none;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border-radius: 10px;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      font-size: 18px;
    }

    .send-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 5px 15px rgba(99, 102, 241, 0.3);
    }

    .send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(4px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal {
      background: var(--bg-card);
      border-radius: 16px;
      padding: 24px;
      width: 100%;
      max-width: 420px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }

    .modal h3 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 16px;
    }

    .modal-actions {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }

    .btn-secondary {
      flex: 1;
      padding: 12px 16px;
      background: var(--bg-hover);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-primary);
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .btn-secondary:hover {
      background: var(--border);
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-muted);
    }

    /* Responsive */
    @media (max-width: 768px) {
      .sidebar {
        width: 100%;
        position: absolute;
        height: 100%;
        z-index: 100;
        transform: translateX(-100%);
        transition: transform 0.3s ease;
      }

      .sidebar.visible {
        transform: translateX(0);
      }

      .chat-area {
        width: 100%;
      }

      .message-bubble {
        max-width: 85%;
      }

      .modal {
        margin: 20px;
      }
    }

    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      padding: 16px 20px;
      border-radius: 10px;
      color: var(--text-primary);
      z-index: 2000;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.3s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body>

<div class="app-container">
  <!-- Auth Screen -->
  <div id="authScreen" class="auth-screen" style="display: none;">
    <div class="auth-card">
      <div class="auth-header">
        <h1>Nexus Chat</h1>
        <p>Modern messaging for everyone</p>
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active" onclick="switchAuthTab('login')">Sign In</button>
        <button class="auth-tab" onclick="switchAuthTab('signup')">Sign Up</button>
      </div>

      <!-- Login Form -->
      <form class="auth-form active" id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>Email or Username</label>
          <input type="text" id="loginEmail" placeholder="your@email.com or username" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="••••••••" required>
        </div>
        <div class="form-error" id="loginError"></div>
        <button type="submit" class="btn btn-primary">Sign In</button>
      </form>

      <!-- Signup Form -->
      <form class="auth-form" id="signupForm" onsubmit="handleSignup(event)">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="signupUsername" placeholder="your_username" required>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="signupEmail" placeholder="your@email.com" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="signupPassword" placeholder="••••••••" required>
        </div>
        <div class="form-error" id="signupError"></div>
        <button type="submit" class="btn btn-primary">Create Account</button>
      </form>
    </div>
  </div>

  <!-- Chat Layout -->
  <div id="chatLayout" class="chat-layout" style="display: none;">
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-title">Nexus</div>
        <div class="sidebar-actions">
          <button class="icon-btn" onclick="openNewChatModal()">➕</button>
          <button class="icon-btn" onclick="openSettings()">⚙️</button>
        </div>
      </div>

      <input type="text" class="search-box" id="searchBox" placeholder="Search chats..." onkeyup="filterChats()">

      <div class="chat-list" id="chatList"></div>
    </div>

    <!-- Chat Area -->
    <div class="chat-area">
      <div id="emptyState" class="empty-state">
        <div class="empty-state-icon">💬</div>
        <h3>No chat selected</h3>
        <p>Select a conversation to start messaging</p>
      </div>

      <div id="chatContent" style="display: none; flex: 1; display: flex; flex-direction: column;">
        <div class="chat-header">
          <div class="chat-header-info">
            <div class="chat-avatar" id="chatAvatar">?</div>
            <div class="chat-header-text">
              <h2 id="chatTitle">Chat</h2>
              <p id="chatSubtitle"></p>
            </div>
          </div>
          <div class="sidebar-actions">
            <button class="icon-btn" id="settingsBtn" style="display: none;" onclick="openChatSettings()">⚙️</button>
            <button class="icon-btn" onclick="deleteChat()">🗑️</button>
          </div>
        </div>

        <div class="messages-container" id="messagesContainer"></div>

        <div class="input-area">
          <div class="input-wrapper">
            <textarea class="message-input" id="messageInput" placeholder="Type a message..." onkeydown="handleMessageKeydown(event)" oninput="autoResizeInput(this)"></textarea>
            <button class="send-btn" onclick="sendMessage()">➤</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modals -->
<div class="modal-overlay" id="newChatModal">
  <div class="modal">
    <h3>Start New Chat</h3>
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="newChatUsername" placeholder="Search for a user...">
    </div>
    <div class="form-error" id="newChatError"></div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal('newChatModal')">Cancel</button>
      <button class="btn btn-primary" onclick="startNewChat()">Start Chat</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <h3>Settings</h3>
    <div class="form-group">
      <label>Your Username</label>
      <input type="text" id="settingsUsername" disabled>
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="logout()">Logout</button>
      <button class="btn btn-primary" onclick="closeModal('settingsModal')">Close</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="chatSettingsModal">
  <div class="modal">
    <h3>Chat Settings</h3>
    <div id="chatSettingsContent"></div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal('chatSettingsModal')">Close</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// Firebase Config
var firebaseConfig = {
  apiKey: "AIzaSyBeQR-07p_gkN1ygr49rh-PSI-pRsdmoDw",
  authDomain: "chat-82a4b.firebaseapp.com",
  databaseURL: "https://chat-82a4b-default-rtdb.firebaseio.com",
  projectId: "chat-82a4b",
  storageBucket: "chat-82a4b.appspot.com"
};

firebase.initializeApp(firebaseConfig);
var auth = firebase.auth();
var db = firebase.database();

// State
var currentUser = null;
var currentUsername = '';
var currentChatId = null;
var currentChatType = null;
var chats = {};
var messageListeners = [];
var memberColors = {};
var colorPalette = ['#FF6B6B', '#4ECDC4', '#45B7D1', '#FFA07A', '#98D8C8', '#F7DC6F', '#BB8FCE', '#85C1E2', '#FF9FF3', '#54A0FF', '#48DBFB', '#1DD1A1', '#FDCB6E', '#6C5CE7', '#A29BFE', '#FD79A8', '#74B9FF', '#55EFC4', '#FF7675', '#D63031', '#00B894', '#0984E3'];

// Auth
auth.onAuthStateChanged(function(user) {
  if (user) {
    currentUser = user;
    document.getElementById('authScreen').style.display = 'none';
    document.getElementById('chatLayout').style.display = 'flex';
    initChat();
  } else {
    currentUser = null;
    document.getElementById('authScreen').style.display = 'flex';
    document.getElementById('chatLayout').style.display = 'none';
  }
});

function switchAuthTab(tab) {
  document.querySelectorAll('.auth-tab').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.auth-form').forEach(el => el.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById(tab + 'Form').classList.add('active');
}

function handleLogin(e) {
  e.preventDefault();
  var input = document.getElementById('loginEmail').value.trim();
  var password = document.getElementById('loginPassword').value;
  var errorEl = document.getElementById('loginError');
  errorEl.style.display = 'none';

  if (input.includes('@')) {
    auth.signInWithEmailAndPassword(input, password).catch(err => {
      errorEl.textContent = err.message;
      errorEl.style.display = 'block';
    });
  } else {
    db.ref('usernames/' + input.toLowerCase()).once('value').then(snap => {
      if (!snap.exists()) {
        errorEl.textContent = 'User not found';
        errorEl.style.display = 'block';
        return;
      }
      var email = snap.val().email;
      auth.signInWithEmailAndPassword(email, password).catch(err => {
        errorEl.textContent = err.message;
        errorEl.style.display = 'block';
      });
    });
  }
}

function handleSignup(e) {
  e.preventDefault();
  var username = document.getElementById('signupUsername').value.trim();
  var email = document.getElementById('signupEmail').value.trim();
  var password = document.getElementById('signupPassword').value;
  var errorEl = document.getElementById('signupError');
  errorEl.style.display = 'none';

  if (username.length < 3 || !/^[a-zA-Z0-9_]+$/.test(username)) {
    errorEl.textContent = 'Username must be 3+ chars, letters/numbers/underscores only';
    errorEl.style.display = 'block';
    return;
  }

  db.ref('usernames/' + username.toLowerCase()).once('value').then(snap => {
    if (snap.exists()) {
      errorEl.textContent = 'Username already taken';
      errorEl.style.display = 'block';
      return;
    }

    auth.createUserWithEmailAndPassword(email, password).then(result => {
      var uid = result.user.uid;
      var updates = {};
      updates['users/' + uid] = {
        username: username,
        usernameLower: username.toLowerCase(),
        email: email,
        createdAt: Date.now()
      };
      updates['usernames/' + username.toLowerCase()] = { uid: uid, email: email };
      db.ref().update(updates);
      showToast('Account created!');
    }).catch(err => {
      errorEl.textContent = err.message;
      errorEl.style.display = 'block';
    });
  });
}

function initChat() {
  db.ref('users/' + currentUser.uid).once('value').then(snap => {
    if (snap.exists()) {
      currentUsername = snap.val().username;
      document.getElementById('settingsUsername').value = '@' + currentUsername;
    }
  });

  loadChats();
}

function loadChats() {
  db.ref('contacts/' + currentUser.uid).on('value', snap => {
    var list = document.getElementById('chatList');
    list.innerHTML = '';
    if (snap.exists()) {
      snap.forEach(child => {
        var uid = child.key;
        var data = child.val();
        renderChatItem(uid, data.name, 'dm', list);
      });
    }
  });

  db.ref('groupMembers/' + currentUser.uid).on('value', snap => {
    if (snap.exists()) {
      snap.forEach(child => {
        var groupId = child.key;
        db.ref('groups/' + groupId).once('value').then(gsnap => {
          if (gsnap.exists()) {
            renderChatItem(groupId, gsnap.val().name, 'group', document.getElementById('chatList'));
          }
        });
      });
    }
  });
}

function renderChatItem(id, name, type, list) {
  var item = document.createElement('div');
  item.className = 'chat-item';
  item.setAttribute('data-id', id);
  item.setAttribute('data-type', type);
  item.innerHTML = `
    <div class="chat-avatar">${name[0].toUpperCase()}</div>
    <div class="chat-info">
      <div class="chat-name">${name}</div>
      <div class="chat-preview">Start a conversation...</div>
    </div>
  `;
  item.onclick = () => openChat(id, name, type);
  list.appendChild(item);
}

function openChat(id, name, type) {
  clearMessageListeners();
  currentChatId = id;
  currentChatType = type;

  document.querySelectorAll('.chat-item').forEach(el => el.classList.remove('active'));
  document.querySelector(`[data-id="${id}"][data-type="${type}"]`).classList.add('active');

  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('chatContent').style.display = 'flex';
  document.getElementById('chatTitle').textContent = name;
  document.getElementById('chatAvatar').textContent = name[0].toUpperCase();
  document.getElementById('settingsBtn').style.display = type === 'group' ? 'flex' : 'none';

  var path = type === 'dm' ? 'messages/' + chatId(currentUser.uid, id) : 'groupMessages/' + id;
  loadMessages(path, type === 'group');
}

function loadMessages(path, isGroup) {
  var ref = db.ref(path);
  var listener = ref.on('value', snap => {
    var container = document.getElementById('messagesContainer');
    container.innerHTML = '';
    snap.forEach(child => {
      var msg = child.val();
      msg._key = child.key;
      renderMessage(msg, isGroup);
    });
    container.scrollTop = container.scrollHeight;
  });
  messageListeners.push({ ref: ref, listener: listener });
}

function renderMessage(msg, isGroup) {
  var container = document.getElementById('messagesContainer');
  var isOwn = msg.sender === currentUser.uid;
  
  var group = document.createElement('div');
  group.className = 'message-group' + (isOwn ? ' own' : '');

  var bubble = document.createElement('div');
  bubble.className = 'message-bubble';

  var html = '';
  if (isGroup && !isOwn) {
    html += `<div class="message-sender">@${msg.senderName || 'Unknown'}</div>`;
  }
  html += `<div class="message-text">${escapeHtml(msg.text)}</div>`;
  html += `<div class="message-time">${formatTime(msg.ts)}${isOwn ? ' ✓' : ''}</div>`;

  bubble.innerHTML = html;
  group.appendChild(bubble);
  container.appendChild(group);
}

function sendMessage() {
  var text = document.getElementById('messageInput').value.trim();
  if (!text || !currentChatId) return;

  var path = currentChatType === 'dm' ? 'messages/' + chatId(currentUser.uid, currentChatId) : 'groupMessages/' + currentChatId;
  var ref = db.ref(path).push();
  ref.set({
    sender: currentUser.uid,
    senderName: currentUsername,
    text: text,
    ts: Date.now()
  });

  document.getElementById('messageInput').value = '';
  document.getElementById('messageInput').style.height = 'auto';
}

function handleMessageKeydown(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResizeInput(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function deleteChat() {
  if (!confirm('Delete this chat?')) return;
  if (currentChatType === 'dm') {
    db.ref('contacts/' + currentUser.uid + '/' + currentChatId).remove();
    db.ref('contacts/' + currentChatId + '/' + currentUser.uid).remove();
  } else {
    db.ref('groupMembers/' + currentUser.uid + '/' + currentChatId).remove();
  }
  document.getElementById('emptyState').style.display = 'flex';
  document.getElementById('chatContent').style.display = 'none';
  currentChatId = null;
}

function openNewChatModal() {
  document.getElementById('newChatUsername').value = '';
  document.getElementById('newChatError').style.display = 'none';
  openModal('newChatModal');
}

function startNewChat() {
  var username = document.getElementById('newChatUsername').value.trim().toLowerCase();
  var errorEl = document.getElementById('newChatError');
  errorEl.style.display = 'none';

  if (!username) {
    errorEl.textContent = 'Enter a username';
    errorEl.style.display = 'block';
    return;
  }

  db.ref('usernames/' + username).once('value').then(snap => {
    if (!snap.exists()) {
      errorEl.textContent = 'User not found';
      errorEl.style.display = 'block';
      return;
    }
    var uid = snap.val().uid;
    var updates = {};
    updates['contacts/' + currentUser.uid + '/' + uid] = { name: username };
    updates['contacts/' + uid + '/' + currentUser.uid] = { name: currentUsername };
    db.ref().update(updates);
    closeModal('newChatModal');
    showToast('Chat started!');
  });
}

function openSettings() {
  openModal('settingsModal');
}

function openChatSettings() {
  openModal('chatSettingsModal');
}

function openModal(id) {
  document.getElementById(id).classList.add('open');
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

function logout() {
  auth.signOut();
  closeModal('settingsModal');
}

function deleteChat() {
  if (!confirm('Delete this chat?')) return;
  if (currentChatType === 'dm') {
    db.ref('contacts/' + currentUser.uid + '/' + currentChatId).remove();
    db.ref('contacts/' + currentChatId + '/' + currentUser.uid).remove();
  } else {
    db.ref('groupMembers/' + currentUser.uid + '/' + currentChatId).remove();
  }
  document.getElementById('emptyState').style.display = 'flex';
  document.getElementById('chatContent').style.display = 'none';
  currentChatId = null;
  showToast('Chat deleted');
}

function filterChats() {
  var query = document.getElementById('searchBox').value.toLowerCase();
  document.querySelectorAll('.chat-item').forEach(item => {
    var name = item.querySelector('.chat-name').textContent.toLowerCase();
    item.style.display = name.includes(query) ? '' : 'none';
  });
}

function showToast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}

function clearMessageListeners() {
  messageListeners.forEach(l => {
    try {
      l.ref.off('value', l.listener);
    } catch (e) {}
  });
  messageListeners = [];
}

function chatId(a, b) {
  return [a, b].sort().join('_');
}

function formatTime(ts) {
  var d = new Date(ts);
  return d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');
}

function escapeHtml(text) {
  var map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
  return text.replace(/[&<>"']/g, m => map[m]);
}

// Event delegation for chat items
document.addEventListener('click', e => {
  var modal = e.target.closest('.modal-overlay');
  if (modal && e.target === modal) {
    modal.classList.remove('open');
  }
});
</script>
