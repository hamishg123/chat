<!DOCTYPE html>
<html>
<head>
<title>Chat</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
margin-top:40px;
}

#app{
display:flex;
width:750px;
height:450px;
background:#1e293b;
border-radius:10px;
overflow:hidden;
}

#inbox{
width:220px;
background:#020617;
padding:10px;
overflow-y:auto;
border-right:1px solid #334155;
}

.user{
padding:8px;
background:#1e293b;
margin-bottom:6px;
border-radius:5px;
display:flex;
justify-content:space-between;
align-items:center;
}

.user span{
cursor:pointer;
}

.user button{
background:none;
border:none;
color:white;
cursor:pointer;
}

#chatArea{
flex:1;
display:flex;
flex-direction:column;
}

#top{
display:flex;
justify-content:space-between;
padding:10px;
border-bottom:1px solid #334155;
}

#messages{
flex:1;
overflow-y:auto;
padding:10px;
}

.msg{
margin:6px 0;
padding:8px;
border-radius:6px;
max-width:70%;
position:relative;
}

.me{
background:#2563eb;
margin-left:auto;
}

.them{
background:#334155;
}

.msgMenu{
position:absolute;
right:6px;
top:4px;
cursor:pointer;
font-size:14px;
}

#sendBar{
display:flex;
padding:10px;
background:#020617;
}

#sendBar input{
flex:1;
padding:10px;
border:none;
border-radius:5px;
margin-right:5px;
}

#sendBar button{
padding:10px 15px;
background:#2563eb;
border:none;
color:white;
border-radius:5px;
cursor:pointer;
}

</style>
</head>

<body>

<div id="app">

<div id="inbox">

<h3>Inbox</h3>

<div id="userList"></div>

<input id="friendCode" placeholder="Enter code">
<button onclick="openChat()">Chat</button>

</div>

<div id="chatArea">

<div id="top">

<div>Your Code: <b id="myCode"></b></div>

<div style="cursor:pointer" onclick="deleteChat()">⋮</div>

</div>

<div id="messages"></div>

<div id="sendBar">

<input id="messageInput" placeholder="Type message">
<button onclick="sendMessage()">Send</button>

</div>

</div>

</div>

<script>

// USER CODE
let myCode = localStorage.getItem("myCode")

if(!myCode){
myCode = Math.floor(100000 + Math.random()*900000).toString()
localStorage.setItem("myCode",myCode)
}

document.getElementById("myCode").innerText = myCode


// FIREBASE CONFIG
const firebaseConfig = {
apiKey: "AIzaSyBeQR-07p_gkN1ygr49rh-PSI-pRsdmoDw",
authDomain: "chat-82a4b.firebaseapp.com",
databaseURL: "https://chat-82a4b-default-rtdb.firebaseio.com",
projectId: "chat-82a4b"
}

firebase.initializeApp(firebaseConfig)

const db = firebase.database()


function chatID(a,b){
return [a,b].sort().join("_")
}

let currentFriend = null


// ENTER TO SEND
document.getElementById("messageInput").addEventListener("keypress",function(e){

if(e.key==="Enter"){
sendMessage()
}

})


// OPEN CHAT
function openChat(){

let friend = document.getElementById("friendCode").value

if(!friend) return

loadChat(friend)

}


function loadChat(friend){

currentFriend = friend

let id = chatID(myCode,friend)

db.ref("chats/"+id).off()

db.ref("chats/"+id).on("value",snap=>{

let box = document.getElementById("messages")

box.innerHTML=""

snap.forEach(m=>{

let data = m.val()
let key = m.key

let div = document.createElement("div")

if(data.sender === myCode){

div.className="msg me"

div.innerHTML=`
<div class="msgMenu" onclick="deleteMessage('${key}')">⋮</div>
<b>Me</b><br>
${data.text}
`

}else{

div.className="msg them"

div.innerHTML=`
<b>${data.sender}</b><br>
${data.text}
`

}

box.appendChild(div)

})

box.scrollTop = box.scrollHeight

})

updateInbox(friend)

}


// SEND MESSAGE
function sendMessage(){

let msg = document.getElementById("messageInput").value

if(!msg || !currentFriend) return

let id = chatID(myCode,currentFriend)

db.ref("chats/"+id).push({

sender: myCode,
text: msg,
time: Date.now()

})

document.getElementById("messageInput").value=""

updateInbox(currentFriend)

}


// DELETE INDIVIDUAL MESSAGE
function deleteMessage(messageKey){

if(!confirm("Delete this message?")) return

let id = chatID(myCode,currentFriend)

db.ref("chats/"+id+"/"+messageKey).remove()

}


// DELETE CHAT
function deleteChat(){

if(!currentFriend) return

if(!confirm("Delete this chat?")) return

let id = chatID(myCode,currentFriend)

db.ref("chats/"+id).remove()

document.getElementById("messages").innerHTML=""

}


// INBOX
function updateInbox(friend){

let list = JSON.parse(localStorage.getItem("inbox_"+myCode)) || []

if(!list.includes(friend)){

list.push(friend)

localStorage.setItem("inbox_"+myCode,JSON.stringify(list))

renderInbox()

}

}


function deleteContact(user){

if(!confirm("Delete contact and chat?")) return

let list = JSON.parse(localStorage.getItem("inbox_"+myCode)) || []

list = list.filter(u=>u!==user)

localStorage.setItem("inbox_"+myCode,JSON.stringify(list))

let id = chatID(myCode,user)

db.ref("chats/"+id).remove()

renderInbox()

document.getElementById("messages").innerHTML=""

}


// RENDER INBOX
function renderInbox(){

let list = JSON.parse(localStorage.getItem("inbox_"+myCode)) || []

let box = document.getElementById("userList")

box.innerHTML=""

list.forEach(user=>{

let div = document.createElement("div")

div.className="user"

let name = document.createElement("span")
name.innerText=user
name.onclick=()=>loadChat(user)

let dots = document.createElement("button")
dots.innerText="⋮"
dots.onclick=()=>deleteContact(user)

div.appendChild(name)
div.appendChild(dots)

box.appendChild(div)

})

}

renderInbox()

</script>

</body>
</html>
