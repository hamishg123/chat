<!DOCTYPE html>
<html>
<head>
<title>Chat</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>

html,body{
margin:0;
height:100%;
font-family:Arial;
background:#0f172a;
color:white;
}

#app{
display:flex;
height:100vh;
width:100vw;
}

#inbox{
width:260px;
background:#020617;
padding:10px;
overflow-y:auto;
border-right:1px solid #334155;
}

.user{
padding:10px;
background:#1e293b;
margin-bottom:6px;
border-radius:6px;
display:flex;
justify-content:space-between;
align-items:center;
cursor:pointer;
}

.user:hover{
background:#334155;
}

.user button{
background:none;
border:none;
color:white;
cursor:pointer;
font-size:16px;
}

#chatArea{
flex:1;
display:flex;
flex-direction:column;
}

#top{
display:flex;
justify-content:space-between;
padding:14px;
border-bottom:1px solid #334155;
background:#020617;
}

#messages{
flex:1;
overflow-y:auto;
padding:20px;
}

.msg{
margin:8px 0;
padding:10px;
border-radius:8px;
max-width:60%;
position:relative;
}

.me{
background:#2563eb;
margin-left:auto;
}

.them{
background:#334155;
}

.msgMenu{
position:absolute;
right:8px;
top:5px;
cursor:pointer;
font-size:14px;
}

#sendBar{
display:flex;
padding:15px;
background:#020617;
border-top:1px solid #334155;
}

#sendBar input{
flex:1;
padding:12px;
border:none;
border-radius:6px;
margin-right:10px;
font-size:14px;
}

#sendBar button{
padding:12px 20px;
background:#2563eb;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

#friendInput{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:6px;
}

</style>
</head>

<body>

<div id="app">

<div id="inbox">

<h3>Inbox</h3>

<div id="userList"></div>

<input id="friendInput" placeholder="Enter code">
<button onclick="openChat()">Start Chat</button>

</div>

<div id="chatArea">

<div id="top">
<div>Your Code: <b id="myCode"></b></div>
<div style="cursor:pointer" onclick="deleteChat()">⋮</div>
</div>

<div id="messages"></div>

<div id="sendBar">
<input id="messageInput" placeholder="Type message">
<button onclick="sendMessage()">Send</button>
</div>

</div>

</div>

<script>

// USER CODE
let myCode = localStorage.getItem("myCode")

if(!myCode){
myCode = Math.floor(100000 + Math.random()*900000).toString()
localStorage.setItem("myCode",myCode)
}

document.getElementById("myCode").innerText = myCode


// FIREBASE
const firebaseConfig = {
apiKey: "AIzaSyBeQR-07p_gkN1ygr49rh-PSI-pRsdmoDw",
authDomain: "chat-82a4b.firebaseapp.com",
databaseURL: "https://chat-82a4b-default-rtdb.firebaseio.com",
projectId: "chat-82a4b"
}

firebase.initializeApp(firebaseConfig)

const db = firebase.database()


function chatID(a,b){
return [a,b].sort().join("_")
}

let currentFriend = null


// ENTER SEND
document.getElementById("messageInput").addEventListener("keypress",function(e){
if(e.key==="Enter") sendMessage()
})


// START CHAT
function openChat(){

let friend = document.getElementById("friendInput").value

if(!friend) return

loadChat(friend)

}


// LOAD CHAT
function loadChat(friend){

currentFriend = friend

let id = chatID(myCode,friend)

db.ref("chats/"+id).off()

db.ref("chats/"+id).on("value",snap=>{

let box = document.getElementById("messages")

box.innerHTML=""

snap.forEach(m=>{

let data = m.val()
let key = m.key

let div = document.createElement("div")

if(data.sender === myCode){

div.className="msg me"

div.innerHTML=`
<div class="msgMenu" onclick="deleteMessage('${key}')">⋮</div>
<b>Me</b><br>
${data.text}
`

}else{

div.className="msg them"

div.innerHTML=`
<b>${data.sender}</b><br>
${data.text}
`

}

box.appendChild(div)

})

box.scrollTop = box.scrollHeight

})

updateInbox(friend)

}


// SEND MESSAGE
function sendMessage(){

let msg = document.getElementById("messageInput").value

if(!msg || !currentFriend) return

let id = chatID(myCode,currentFriend)

db.ref("chats/"+id).push({
sender: myCode,
text: msg,
time: Date.now()
})

document.getElementById("messageInput").value=""

updateInbox(currentFriend)

}


// DELETE MESSAGE
function deleteMessage(key){

if(!confirm("Delete this message?")) return

let id = chatID(myCode,currentFriend)

db.ref("chats/"+id+"/"+key).remove()

}


// DELETE CHAT
function deleteChat(){

if(!currentFriend) return

if(!confirm("Delete this chat?")) return

let id = chatID(myCode,currentFriend)

db.ref("chats/"+id).remove()

document.getElementById("messages").innerHTML=""

}


// INBOX SYSTEM
function updateInbox(friend){

let list = JSON.parse(localStorage.getItem("inbox_"+myCode)) || []

if(!list.includes(friend)){

list.push(friend)

localStorage.setItem("inbox_"+myCode,JSON.stringify(list))

renderInbox()

}

}


// DELETE CONTACT
function deleteContact(e,user){

e.stopPropagation()

if(!confirm("Delete contact and chat?")) return

let list = JSON.parse(localStorage.getItem("inbox_"+myCode)) || []

list = list.filter(u=>u!==user)

localStorage.setItem("inbox_"+myCode,JSON.stringify(list))

let id = chatID(myCode,user)

db.ref("chats/"+id).remove()

renderInbox()

document.getElementById("messages").innerHTML=""

}


// RENDER INBOX
function renderInbox(){

let list = JSON.parse(localStorage.getItem("inbox_"+myCode)) || []

let box = document.getElementById("userList")

box.innerHTML=""

list.forEach(user=>{

let div = document.createElement("div")
div.className="user"
div.onclick=()=>loadChat(user)

let name = document.createElement("span")
name.innerText=user

let dots = document.createElement("button")
dots.innerText="⋮"
dots.onclick=(e)=>deleteContact(e,user)

div.appendChild(name)
div.appendChild(dots)

box.appendChild(div)

})

}

renderInbox()

</script>

</body>
</html>
