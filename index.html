<!DOCTYPE html>
<html>
<head>
<title>Website Chat</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

#chat{
width:400px;
height:300px;
margin:auto;
overflow-y:auto;
border:1px solid white;
background:#222;
padding:10px;
}

input{
padding:8px;
margin:5px;
}

button{
padding:8px;
cursor:pointer;
}

.message{
margin:4px;
padding:6px;
background:#333;
border-radius:5px;
}

</style>
</head>

<body>

<h2>Chat</h2>

<p>Your Code: <b id="myCode"></b></p>

<input id="friendCode" placeholder="Friend code">
<button onclick="openChat()">Open Chat</button>

<div id="chat"></div>

<br>

<input id="message" placeholder="Type message">
<button onclick="send()">Send</button>

<script>

// USER CODE
let myCode = localStorage.getItem("myCode")

if(!myCode){
myCode = Math.floor(100000 + Math.random()*900000).toString()
localStorage.setItem("myCode",myCode)
}

document.getElementById("myCode").innerText = myCode



// FIREBASE CONFIG
const firebaseConfig = {
apiKey: "AIzaSyBeQR-07p_gkN1ygr49rh-PSI-pRsdmoDw",
authDomain: "chat-82a4b.firebaseapp.com",
databaseURL: "https://chat-82a4b-default-rtdb.firebaseio.com",
projectId: "chat-82a4b",
}

firebase.initializeApp(firebaseConfig)

const db = firebase.database()


// CREATE CHAT ID
function chatID(a,b){
return [a,b].sort().join("_")
}


let currentFriend = null



// OPEN CHAT
function openChat(){

currentFriend = document.getElementById("friendCode").value

if(!currentFriend) return

let id = chatID(myCode,currentFriend)

db.ref("chats/"+id).off()

db.ref("chats/"+id).on("value",snap=>{

let chat = document.getElementById("chat")

chat.innerHTML=""

snap.forEach(m=>{

let data = m.val()

let div = document.createElement("div")
div.className="message"

div.innerHTML = "<b>"+data.sender+"</b>: "+data.text

chat.appendChild(div)

})

chat.scrollTop = chat.scrollHeight

})

}



// SEND MESSAGE
function send(){

let msg = document.getElementById("message").value

if(!msg || !currentFriend) return

let id = chatID(myCode,currentFriend)

db.ref("chats/"+id).push({

sender: myCode,
text: msg,
time: Date.now()

})

document.getElementById("message").value=""

}

</script>

</body>
</html>
