<!DOCTYPE html>
<html>
<head>
<title>Chat</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
margin-top:40px;
}

#app{
display:flex;
width:750px;
height:450px;
background:#1e293b;
border-radius:10px;
overflow:hidden;
}

#inbox{
width:200px;
background:#020617;
padding:10px;
overflow-y:auto;
border-right:1px solid #334155;
}

#inbox h3{
margin-top:0;
}

.user{
padding:8px;
background:#1e293b;
margin-bottom:5px;
cursor:pointer;
border-radius:5px;
}

.user:hover{
background:#334155;
}

#chatArea{
flex:1;
display:flex;
flex-direction:column;
}

#messages{
flex:1;
overflow-y:auto;
padding:10px;
}

.msg{
margin:6px 0;
padding:8px;
border-radius:6px;
max-width:70%;
}

.me{
background:#2563eb;
margin-left:auto;
}

.them{
background:#334155;
}

#sendBar{
display:flex;
padding:10px;
background:#020617;
}

#sendBar input{
flex:1;
padding:10px;
border:none;
border-radius:5px;
margin-right:5px;
}

#sendBar button{
padding:10px 15px;
background:#2563eb;
border:none;
color:white;
border-radius:5px;
cursor:pointer;
}

#sendBar button:hover{
background:#1d4ed8;
}

#top{
padding:10px;
border-bottom:1px solid #334155;
}

</style>
</head>

<body>

<div id="app">

<div id="inbox">
<h3>Inbox</h3>
<div id="userList"></div>
<input id="friendCode" placeholder="Enter code">
<button onclick="openChat()">Chat</button>
</div>

<div id="chatArea">

<div id="top">
Your Code: <b id="myCode"></b>
</div>

<div id="messages"></div>

<div id="sendBar">
<input id="messageInput" placeholder="Type message">
<button onclick="sendMessage()">Send</button>
</div>

</div>

</div>

<script>

// USER CODE
let myCode = localStorage.getItem("myCode")

if(!myCode){
myCode = Math.floor(100000 + Math.random()*900000).toString()
localStorage.setItem("myCode",myCode)
}

document.getElementById("myCode").innerText = myCode


// FIREBASE
const firebaseConfig = {
apiKey: "AIzaSyBeQR-07p_gkN1ygr49rh-PSI-pRsdmoDw",
authDomain: "chat-82a4b.firebaseapp.com",
databaseURL: "https://chat-82a4b-default-rtdb.firebaseio.com",
projectId: "chat-82a4b"
}

firebase.initializeApp(firebaseConfig)

const db = firebase.database()


function chatID(a,b){
return [a,b].sort().join("_")
}


let currentFriend = null


// ENTER TO SEND
document.getElementById("messageInput").addEventListener("keypress",function(e){

if(e.key==="Enter"){
sendMessage()
}

})


// OPEN CHAT
function openChat(){

let friend = document.getElementById("friendCode").value

if(friend==="") return

loadChat(friend)

}


function loadChat(friend){

currentFriend = friend

let id = chatID(myCode,friend)

db.ref("chats/"+id).off()

db.ref("chats/"+id).on("value",snap=>{

let box = document.getElementById("messages")

box.innerHTML=""

snap.forEach(m=>{

let data = m.val()

let div = document.createElement("div")

if(data.sender === myCode){

div.className="msg me"
div.innerHTML="<b>Me</b><br>"+data.text

}else{

div.className="msg them"
div.innerHTML="<b>"+data.sender+"</b><br>"+data.text

}

box.appendChild(div)

})

box.scrollTop = box.scrollHeight

})

updateInbox(friend)

}


// SEND MESSAGE
function sendMessage(){

let msg = document.getElementById("messageInput").value

if(!msg || !currentFriend) return

let id = chatID(myCode,currentFriend)

db.ref("chats/"+id).push({

sender: myCode,
text: msg,
time: Date.now()

})

document.getElementById("messageInput").value=""

updateInbox(currentFriend)

}


// INBOX SYSTEM
function updateInbox(friend){

let list = JSON.parse(localStorage.getItem("inbox_"+myCode)) || []

if(!list.includes(friend)){

list.push(friend)

localStorage.setItem("inbox_"+myCode,JSON.stringify(list))

renderInbox()

}

}


function renderInbox(){

let list = JSON.parse(localStorage.getItem("inbox_"+myCode)) || []

let box = document.getElementById("userList")

box.innerHTML=""

list.forEach(user=>{

let div = document.createElement("div")

div.className="user"

div.innerText=user

div.onclick=()=>loadChat(user)

box.appendChild(div)

})

}

renderInbox()

</script>

</body>
</html>
