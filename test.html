<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SecureChat</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
height:100vh;
}

.light{
background:white;
color:black;
}

#sidebar{
width:260px;
background:#020617;
padding:20px;
overflow:auto;
}

#chat{
flex:1;
display:flex;
flex-direction:column;
}

#messages{
flex:1;
overflow:auto;
padding:20px;
}

.message{
background:#1e293b;
padding:10px;
margin-bottom:10px;
border-radius:8px;
position:relative;
}

.light .message{
background:#ddd;
}

.delete{
position:absolute;
right:8px;
top:5px;
cursor:pointer;
color:red;
}

.contact{
padding:10px;
background:#1e293b;
margin-bottom:8px;
border-radius:6px;
cursor:pointer;
}

.light .contact{
background:#ccc;
}

.online{color:#22c55e;}
.offline{color:#ef4444;}

#inputArea{
display:flex;
padding:10px;
background:#020617;
gap:5px;
}

input{
flex:1;
padding:10px;
border:none;
border-radius:6px;
}

button{
padding:10px;
background:#2563eb;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

img{
max-width:200px;
border-radius:6px;
}

</style>

</head>

<body>

<div id="sidebar">

<h3>Your Code</h3>
<div id="myCode"></div>

<button onclick="addContact()">Add Contact</button>
<button onclick="toggleTheme()">Toggle Theme</button>

<h3>Contacts</h3>
<div id="contacts"></div>

</div>

<div id="chat">

<div style="padding:15px;background:#020617;">
<span id="chatName">Select Chat</span>

<button onclick="renameContact()">Rename</button>
<button onclick="deleteChat()">Delete Chat</button>
</div>

<div id="messages"></div>

<div id="typing"></div>

<div id="inputArea">

<input id="msgInput" placeholder="Type message">

<input type="file" id="imgUpload">

<button id="record">🎤</button>

<button onclick="sendMessage()">Send</button>

</div>

</div>

<script>

const firebaseConfig = {
apiKey:"YOURKEY",
authDomain:"YOURKEY",
databaseURL:"YOURKEY",
projectId:"YOURKEY"
};

firebase.initializeApp(firebaseConfig);

const auth=firebase.auth();
const db=firebase.database();

let uid;
let myCode;
let currentChat;
let currentChatUid;

auth.signInAnonymously();

auth.onAuthStateChanged(async user=>{

uid=user.uid;

const userRef=db.ref("users/"+uid);

const snap=await userRef.once("value");

if(!snap.exists()){

myCode=Math.floor(1000+Math.random()*9000).toString();

await userRef.set({code:myCode});

db.ref("codes/"+myCode).set(uid);

}else{

myCode=snap.val().code;

}

document.getElementById("myCode").innerText=myCode;

setupPresence();
loadContacts();

});

function setupPresence(){

const presence=db.ref("presence/"+uid);

presence.set(true);

presence.onDisconnect().remove();

}

function addContact(){

let code=prompt("Enter their code");

if(!code) return;

db.ref("codes/"+code).once("value").then(snap=>{

if(!snap.exists()){
alert("User not found");
return;
}

let otherUid=snap.val();

db.ref("contacts/"+uid+"/"+otherUid).set({
name:code
});

});

}

function loadContacts(){

db.ref("contacts/"+uid).on("value",snap=>{

const list=document.getElementById("contacts");
list.innerHTML="";

snap.forEach(child=>{

const otherUid=child.key;
const data=child.val();

const div=document.createElement("div");
div.className="contact";

div.innerHTML=data.name+" <span id='status-"+otherUid+"'></span>";

div.onclick=()=>openChat(otherUid,data.name);

list.appendChild(div);

watchPresence(otherUid);

});

});

}

function watchPresence(id){

db.ref("presence/"+id).on("value",snap=>{

const el=document.getElementById("status-"+id);

if(!el) return;

if(snap.exists()){
el.innerHTML="●";
el.className="online";
}else{
el.innerHTML="●";
el.className="offline";
}

});

}

function chatId(a,b){
return [a,b].sort().join("_");
}

function openChat(otherUid,name){

currentChatUid=otherUid;
currentChat=chatId(uid,otherUid);

document.getElementById("chatName").innerText=name;

loadMessages();
listenTyping();

}

function loadMessages(){

db.ref("messages/"+currentChat).on("value",snap=>{

const box=document.getElementById("messages");
box.innerHTML="";

snap.forEach(child=>{

const m=child.val();

const div=document.createElement("div");
div.className="message";

let content="";

if(m.type==="image"){

content=`<img src="${m.url}">`;

}else if(m.type==="audio"){

content=`<audio controls src="${m.url}"></audio>`;

}else{

content=m.sender+": "+m.text;

}

div.innerHTML=content+
"<span class='delete' onclick='deleteMsg(\""+child.key+"\")'>x</span>";

box.appendChild(div);

});

box.scrollTop=box.scrollHeight;

});

}

function sendMessage(){

const input=document.getElementById("msgInput");

if(input.value==="") return;

db.ref("messages/"+currentChat).push({
type:"text",
sender:myCode,
text:input.value,
time:Date.now()
});

input.value="";

}

function deleteMsg(id){

db.ref("messages/"+currentChat+"/"+id).remove();

}

function deleteChat(){

if(!confirm("Delete entire chat?")) return;

db.ref("messages/"+currentChat).remove();

}

function renameContact(){

let name=prompt("New name");

if(!name) return;

db.ref("contacts/"+uid+"/"+currentChatUid+"/name").set(name);

}

document.getElementById("msgInput").addEventListener("keypress",e=>{

if(e.key==="Enter") sendMessage();

});

document.getElementById("msgInput").addEventListener("input",()=>{

db.ref("typing/"+currentChat+"/"+uid).set(true);

setTimeout(()=>{
db.ref("typing/"+currentChat+"/"+uid).remove();
},1000);

});

function listenTyping(){

db.ref("typing/"+currentChat).on("value",snap=>{

let typing=false;

snap.forEach(c=>{
if(c.key!==uid) typing=true;
});

document.getElementById("typing").innerText=
typing?"User is typing...":"";

});

}

imgUpload.onchange=e=>{

let file=e.target.files[0];

let reader=new FileReader();

reader.onload=()=>{

db.ref("messages/"+currentChat).push({
type:"image",
url:reader.result,
sender:myCode,
time:Date.now()
});

};

reader.readAsDataURL(file);

};

let recorder;
let chunks=[];

record.onclick=async()=>{

let stream=await navigator.mediaDevices.getUserMedia({audio:true});

recorder=new MediaRecorder(stream);

recorder.start();

recorder.ondataavailable=e=>chunks.push(e.data);

recorder.onstop=e=>{

let blob=new Blob(chunks);

let reader=new FileReader();

reader.onload=()=>{

db.ref("messages/"+currentChat).push({
type:"audio",
url:reader.result,
sender:myCode,
time:Date.now()
});

};

reader.readAsDataURL(blob);

chunks=[];

};

setTimeout(()=>recorder.stop(),3000);

};

function toggleTheme(){

document.body.classList.toggle("light");

}

</script>

</body>
</html>
