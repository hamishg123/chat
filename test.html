
<!DOCTYPE html>
<html>
<head>
<title>Free Chat</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
height:100vh;
display:flex;
}

#inbox{
width:280px;
background:#020617;
border-right:1px solid #334155;
overflow-y:auto;
padding:10px;
}

#myCode{
font-size:12px;
opacity:.7;
margin-bottom:10px;
}

.user{
background:#1e293b;
padding:10px;
border-radius:6px;
margin-bottom:6px;
cursor:pointer;
display:flex;
justify-content:space-between;
align-items:center;
}

.user:hover{
background:#334155;
}

.menu{
cursor:pointer;
padding:4px 8px;
}

#chat{
flex:1;
display:flex;
flex-direction:column;
}

#chatHeader{
padding:10px;
border-bottom:1px solid #334155;
display:flex;
justify-content:space-between;
}

#messages{
flex:1;
overflow-y:auto;
padding:20px;
}

.msg{
padding:10px;
border-radius:8px;
margin:10px 0;
max-width:60%;
position:relative;
}

.me{
background:#2563eb;
margin-left:auto;
}

.them{
background:#334155;
}

.msgMenu{
position:absolute;
top:5px;
right:5px;
cursor:pointer;
font-size:14px;
}

.time{
font-size:10px;
opacity:0.6;
margin-top:4px;
}

#send{
display:flex;
padding:10px;
background:#020617;
border-top:1px solid #334155;
}

#msgInput{
flex:1;
padding:10px;
border:none;
border-radius:6px;
margin-right:10px;
}

#send button{
background:#2563eb;
border:none;
padding:10px 20px;
color:white;
border-radius:6px;
cursor:pointer;
}

#popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.6);
align-items:center;
justify-content:center;
}

#popupBox{
background:#020617;
padding:20px;
border-radius:10px;
width:260px;
text-align:center;
}

</style>
</head>

<body>

<div id="inbox">

<h3>Inbox</h3>

<div id="myCode"></div>

<div id="users"></div>

<input id="friendCode" placeholder="Enter user code">
<button onclick="startChat()">Chat</button>

</div>

<div id="chat">

<div id="chatHeader">
<span id="title">Select chat</span>
<span class="menu" onclick="deleteConversation()">🗑</span>
</div>

<div id="messages"></div>

<div id="send">
<input id="msgInput" placeholder="Type message">
<button onclick="sendMessage()">Send</button>
</div>

</div>

<div id="popup">
<div id="popupBox">
<p id="popupText"></p>
<button id="popupYes">Confirm</button>
<button onclick="closePopup()">Cancel</button>
</div>
</div>

<script>

const firebaseConfig={
apiKey:"AIzaSyBeQR-07p_gkN1ygr49rh-PSI-pRsdmoDw",
authDomain:"chat-82a4b.firebaseapp.com",
databaseURL:"https://chat-82a4b-default-rtdb.firebaseio.com",
projectId:"chat-82a4b"
}

firebase.initializeApp(firebaseConfig)
const db=firebase.database()

let myUID
let myCode
let currentFriend=null
let chatListener=null
let sending=false

firebase.auth().onAuthStateChanged(user=>{

if(user){

myUID=user.uid
myCode=myUID.slice(0,6)

myCodeDiv.innerText="Your Code: "+myCode

createUser()
loadInbox()

}else{
firebase.auth().signInAnonymously()
}

})

function createUser(){

db.ref("users/"+myUID).once("value").then(snap=>{

if(!snap.exists()){

db.ref("users/"+myUID).set({
code:myCode,
username:"User-"+myCode
})

db.ref("codes/"+myCode).set(myUID)

}

})

}

function chatID(a,b){
return[a,b].sort().join("_")
}

function startChat(){

let code=friendCode.value.trim()

if(!code)return

db.ref("codes/"+code).once("value").then(snap=>{

if(!snap.exists()){
alert("User not found")
return
}

let uid=snap.val()

if(uid===myUID){
alert("You can't chat with yourself")
return
}

loadChat(uid)

})

}

function loadChat(friend){

currentFriend=friend
messages.innerHTML=""

db.ref("users/"+friend+"/username").once("value",snap=>{
title.innerText=snap.val()+" ("+friend.slice(0,6)+")"
})

let id=chatID(myUID,friend)

if(chatListener) chatListener.off()

chatListener=db.ref("chats/"+id)

chatListener.limitToLast(50).on("child_added",snap=>{

let data=snap.val()

let div=document.createElement("div")
div.className="msg "+(data.sender===myUID?"me":"them")

div.innerHTML=`
${data.sender===myUID?`<span class="msgMenu" onclick="deleteMessage('${id}','${snap.key}',event)">⋮</span>`:""}
${data.text}
<div class="time">${new Date(data.time).toLocaleTimeString()}</div>
`

messages.appendChild(div)
messages.scrollTop=messages.scrollHeight

})

}

function sendMessage(){

if(sending) return

let text=msgInput.value.trim()

if(!text||!currentFriend)return

sending=true

let id=chatID(myUID,currentFriend)

db.ref("chats/"+id).push({
sender:myUID,
text:text,
time:Date.now()
})

updateInbox(currentFriend,text)

msgInput.value=""

setTimeout(()=>sending=false,300)

}

msgInput.addEventListener("keydown",e=>{
if(e.key==="Enter"){
e.preventDefault()
sendMessage()
}
})

function updateInbox(friend,msg){

db.ref("inbox/"+myUID+"/"+friend).set({
lastMessage:msg,
time:Date.now(),
unread:0
})

db.ref("inbox/"+friend+"/"+myUID).transaction(data=>{

if(!data)data={unread:0}

data.unread=(data.unread||0)+1
data.lastMessage=msg
data.time=Date.now()

return data

})

}

function loadInbox(){

db.ref("inbox/"+myUID).orderByChild("time").on("value",snap=>{

users.innerHTML=""

snap.forEach(chat=>{

let friend=chat.key
let data=chat.val()

Promise.all([
db.ref("users/"+friend+"/username").once("value"),
db.ref("contacts/"+myUID+"/"+friend+"/customName").once("value")
]).then(([username,custom])=>{

let name=custom.exists()?custom.val():username.val()

let div=document.createElement("div")
div.className="user"

div.onclick=()=>{
loadChat(friend)
db.ref("inbox/"+myUID+"/"+friend+"/unread").set(0)
}

div.innerHTML=`
<span>${name} (${friend.slice(0,6)})</span>
<span class="menu" onclick="contactMenu('${friend}',event)">⋮</span>
`

users.appendChild(div)

})

})

})

}

function contactMenu(friend,e){

e.stopPropagation()

showPopup("Rename or remove contact?",()=>{

let name=prompt("Enter new name")

if(name){
db.ref("contacts/"+myUID+"/"+friend+"/customName").set(name)
}

})

}

function deleteMessage(chat,id,e){

e.stopPropagation()

showPopup("Delete this message?",()=>{
db.ref("chats/"+chat+"/"+id).remove()
})

}

function deleteConversation(){

if(!currentFriend)return

let id=chatID(myUID,currentFriend)

showPopup("Delete entire conversation?",()=>{

db.ref("chats/"+id).remove()
db.ref("inbox/"+myUID+"/"+currentFriend).remove()

messages.innerHTML=""

})

}

let popupAction=null

function showPopup(text,action){

popupText.innerText=text
popup.style.display="flex"
popupAction=action

}

function closePopup(){

popup.style.display="none"

}

popupYes.onclick=()=>{
if(popupAction) popupAction()
closePopup()
}

</script>

</body>
</html>
```
