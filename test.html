<!DOCTYPE html>
<html>
<head>
<title>Free Chat</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
height:100vh;
display:flex;
}

#inbox{
width:280px;
background:#020617;
border-right:1px solid #334155;
overflow-y:auto;
padding:10px;
}

#chat{
flex:1;
display:flex;
flex-direction:column;
}

.user{
background:#1e293b;
padding:10px;
border-radius:6px;
margin-bottom:6px;
cursor:pointer;
display:flex;
justify-content:space-between;
}

.user:hover{
background:#334155;
}

#messages{
flex:1;
overflow-y:auto;
padding:20px;
}

.msg{
padding:10px;
border-radius:8px;
margin:10px 0;
max-width:60%;
}

.me{
background:#2563eb;
margin-left:auto;
}

.them{
background:#334155;
}

.time{
font-size:10px;
opacity:0.6;
}

#send{
display:flex;
padding:10px;
background:#020617;
border-top:1px solid #334155;
}

#send input{
flex:1;
padding:10px;
border:none;
border-radius:6px;
margin-right:10px;
}

#send button{
background:#2563eb;
border:none;
padding:10px 20px;
color:white;
border-radius:6px;
cursor:pointer;
}

#typing{
font-size:12px;
padding-left:20px;
opacity:.8;
}

</style>
</head>

<body>

<div id="inbox">

<h3 id="myCode">Connecting...</h3>

<div id="users"></div>

<input id="friendCode" placeholder="Enter user code">
<button onclick="startChat()">Chat</button>

</div>

<div id="chat">

<div style="padding:10px;border-bottom:1px solid #334155">
<span id="title">Select a chat</span>
<button onclick="deleteChat()" style="float:right">Delete</button>
</div>

<div id="messages"></div>
<div id="typing"></div>

<div id="send">
<input id="msgInput" placeholder="Type message">
<button onclick="sendMessage()">Send</button>
</div>

</div>

<script>

const firebaseConfig={
apiKey:"AIzaSyBeQR-07p_gkN1ygr49rh-PSI-pRsdmoDw",
authDomain:"chat-82a4b.firebaseapp.com",
databaseURL:"https://chat-82a4b-default-rtdb.firebaseio.com",
projectId:"chat-82a4b"
}

firebase.initializeApp(firebaseConfig)

const db=firebase.database()

let myUID
let myCode
let currentFriend=null

Notification.requestPermission()

firebase.auth().onAuthStateChanged(user=>{

if(user){

myUID=user.uid
myCode=myUID.slice(0,6)

document.getElementById("myCode").innerText="Your code: "+myCode

createUser()

loadInbox()

}else{

firebase.auth().signInAnonymously()

}

})

function createUser(){

db.ref("users/"+myUID).once("value").then(snap=>{

if(!snap.exists()){

db.ref("users/"+myUID).set({
code:myCode,
username:"User-"+myCode,
online:true
})

db.ref("codes/"+myCode).set(myUID)

}else{

db.ref("users/"+myUID+"/online").set(true)

}

})

}

window.addEventListener("beforeunload",()=>{

db.ref("users/"+myUID+"/online").set(false)

})

function chatID(a,b){
return[a,b].sort().join("_")
}

function startChat(){

let code=document.getElementById("friendCode").value.trim()

if(!code)return

db.ref("codes/"+code).once("value").then(snap=>{

if(!snap.exists()){
alert("User not found")
return
}

let friendUID=snap.val()

if(friendUID===myUID){
alert("You can't chat with yourself")
return
}

loadChat(friendUID)

})

}

function loadChat(friend){

currentFriend=friend

document.getElementById("messages").innerHTML=""

db.ref("users/"+friend+"/username").once("value",snap=>{

document.getElementById("title").innerText=snap.val()

})

let id=chatID(myUID,friend)

db.ref("chats/"+id).limitToLast(50).on("child_added",snap=>{

let data=snap.val()

let div=document.createElement("div")

div.className="msg "+(data.sender===myUID?"me":"them")

div.innerHTML=`
${data.text}
<div class="time">${new Date(data.time).toLocaleTimeString()}</div>
`

messages.appendChild(div)

messages.scrollTop=messages.scrollHeight

if(data.sender!==myUID && document.hidden){

new Notification("New message",{body:data.text})

}

})

db.ref("users/"+friend+"/online").on("value",snap=>{

let online=snap.val()

document.getElementById("title").innerText+=online?" (online)":" (offline)"

})

db.ref("typing/"+myUID).on("value",snap=>{

typing.innerText=snap.exists()?"Typing...":""

})

db.ref("inbox/"+myUID+"/"+friend+"/unread").set(0)

}

function sendMessage(){

let text=document.getElementById("msgInput").value.trim()

if(!text||!currentFriend)return

let id=chatID(myUID,currentFriend)

db.ref("chats/"+id).push({
sender:myUID,
text:text,
time:Date.now()
})

updateInbox(currentFriend,text)

msgInput.value=""

}

msgInput.addEventListener("input",()=>{

if(!currentFriend)return

db.ref("typing/"+currentFriend).set(myUID)

setTimeout(()=>{

db.ref("typing/"+currentFriend).remove()

},1500)

})

function updateInbox(friendUID,message){

db.ref("inbox/"+myUID+"/"+friendUID).set({
lastMessage:message,
time:Date.now()
})

db.ref("inbox/"+friendUID+"/"+myUID).transaction(data=>{

if(!data)data={unread:0}

data.unread=(data.unread||0)+1
data.lastMessage=message
data.time=Date.now()

return data

})

}

function loadInbox(){

db.ref("inbox/"+myUID).orderByChild("time").on("value",snap=>{

users.innerHTML=""

snap.forEach(chat=>{

let friendUID=chat.key
let data=chat.val()

db.ref("users/"+friendUID+"/username").once("value",name=>{

let div=document.createElement("div")

div.className="user"

div.innerHTML=`
${name.val()}
${data.unread?`(${data.unread})`:""}
`

div.onclick=()=>loadChat(friendUID)

users.appendChild(div)

})

})

})

}

function deleteChat(){

if(!currentFriend)return

let id=chatID(myUID,currentFriend)

db.ref("chats/"+id).remove()

messages.innerHTML=""

}

</script>

</body>
</html>
