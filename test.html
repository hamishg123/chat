<!DOCTYPE html>
<html>
<head>
<title>Free Chat</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
height:100vh;
display:flex;
}

#inbox{
width:280px;
background:#020617;
border-right:1px solid #334155;
overflow-y:auto;
padding:10px;
}

#chat{
flex:1;
display:flex;
flex-direction:column;
}

.user{
background:#1e293b;
padding:10px;
border-radius:6px;
margin-bottom:6px;
cursor:pointer;
display:flex;
justify-content:space-between;
}

.user:hover{
background:#334155;
}

#messages{
flex:1;
overflow-y:auto;
padding:20px;
}

.msg{
padding:10px;
border-radius:8px;
margin:10px 0;
max-width:60%;
animation:fade .2s;
}

.me{
background:#2563eb;
margin-left:auto;
}

.them{
background:#334155;
}

.time{
font-size:10px;
opacity:0.6;
}

#send{
display:flex;
padding:10px;
background:#020617;
border-top:1px solid #334155;
}

#send input{
flex:1;
padding:10px;
border:none;
border-radius:6px;
margin-right:10px;
}

#send button{
background:#2563eb;
border:none;
padding:10px 20px;
color:white;
border-radius:6px;
cursor:pointer;
}

#typing{
font-size:12px;
padding-left:20px;
opacity:.8;
}

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.6);
display:flex;
align-items:center;
justify-content:center;
}

.popupBox{
background:#020617;
padding:20px;
border-radius:10px;
width:300px;
text-align:center;
}

.hidden{
display:none;
}

@keyframes fade{
from{opacity:0;transform:translateY(5px)}
to{opacity:1}
}

</style>
</head>

<body>

<div id="inbox">
<h3>Inbox</h3>
<div id="users"></div>

<input id="friendCode" placeholder="Enter user code">
<button onclick="startChat()">Chat</button>
</div>

<div id="chat">

<div style="padding:10px;border-bottom:1px solid #334155">
<span id="title">Loading...</span>
<button onclick="deleteChat()" style="float:right">Delete</button>
</div>

<div id="messages"></div>
<div id="typing"></div>

<div id="send">
<input id="msgInput" placeholder="Type message">
<button onclick="sendMessage()">Send</button>
</div>

</div>

<div id="popup" class="popup hidden">
<div class="popupBox">
<p id="popupText"></p>
<button id="popupYes">Confirm</button>
<button onclick="closePopup()">Cancel</button>
</div>
</div>

<script>

const firebaseConfig = {
apiKey:"AIzaSyBeQR-07p_gkN1ygr49rh-PSI-pRsdmoDw",
authDomain:"chat-82a4b.firebaseapp.com",
databaseURL:"https://chat-82a4b-default-rtdb.firebaseio.com",
projectId:"chat-82a4b"
}

firebase.initializeApp(firebaseConfig)
const db=firebase.database()

let myUID
let myCode
let currentFriend=null
let currentChatListener=null

firebase.auth().onAuthStateChanged(user => {

if(user){

myUID = user.uid
myCode = myUID.slice(0,6)

document.getElementById("title").innerText = "Your Code: " + myCode

createUser()

}else{

firebase.auth().signInAnonymously()

}

})

function createUser(){

let userRef = db.ref("users/"+myUID)

userRef.once("value").then(snap=>{

if(!snap.exists()){

db.ref("users/"+myUID).set({
code:myCode,
username:"User-"+myCode
})

db.ref("codes/"+myCode).set(myUID)

}

})

}

function chatID(a,b){
return[a,b].sort().join("_")
}

function startChat(){

let code=document.getElementById("friendCode").value.trim()

if(!code)return

db.ref("codes/"+code).once("value").then(snap=>{

if(!snap.exists()){
alert("User not found")
return
}

let friendUID=snap.val()

if(friendUID===myUID){
alert("You can't chat with yourself")
return
}

loadChat(friendUID)

})

}

function loadChat(friend){

currentFriend=friend

document.getElementById("messages").innerHTML=""

db.ref("users/"+friend+"/username").once("value",snap=>{

document.getElementById("title").innerText=
snap.val()+" ("+friend.slice(0,6)+")"

})

let id=chatID(myUID,friend)

if(currentChatListener){
db.ref("chats/"+id).off()
}

currentChatListener=db.ref("chats/"+id)

currentChatListener.limitToLast(50).on("child_added",snap=>{

let data=snap.val()

let div=document.createElement("div")

div.className="msg "+(data.sender===myUID?"me":"them")

div.innerHTML=`
${data.text}
<div class="time">${new Date(data.time).toLocaleTimeString()}</div>
`

document.getElementById("messages").appendChild(div)

document.getElementById("messages").scrollTop=
document.getElementById("messages").scrollHeight

})

}

function sendMessage(){

let text=document.getElementById("msgInput").value.trim()

if(!text||!currentFriend)return

let id=chatID(myUID,currentFriend)

db.ref("chats/"+id).push({
sender:myUID,
text:text,
time:Date.now()
})

document.getElementById("msgInput").value=""

}

let popupAction=null

function showPopup(text,action){

document.getElementById("popupText").innerText=text
popupAction=action
document.getElementById("popup").classList.remove("hidden")

}

function closePopup(){
document.getElementById("popup").classList.add("hidden")
}

document.getElementById("popupYes").onclick=()=>{
popupAction()
closePopup()
}

function deleteChat(){

if(!currentFriend)return

showPopup("Delete this chat?",()=>{

let id=chatID(myUID,currentFriend)

db.ref("chats/"+id).remove()

document.getElementById("messages").innerHTML=""

})

}

</script>

</body>
</html>
