<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SecureChat</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
height:100vh;
}

.light{
background:#f1f5f9;
color:black;
}

.sidebar{
width:270px;
background:#020617;
padding:20px;
overflow:auto;
}

#myCodeBox{
background:#1e293b;
padding:10px;
border-radius:8px;
font-weight:bold;
margin-bottom:10px;
text-align:center;
}

.contact{
padding:10px;
background:#1e293b;
margin-bottom:8px;
border-radius:6px;
cursor:pointer;
display:flex;
justify-content:space-between;
}

.unread{
background:red;
color:white;
padding:2px 6px;
border-radius:10px;
font-size:12px;
}

#chat{
flex:1;
display:flex;
flex-direction:column;
}

.chatHeader{
padding:15px;
background:#020617;
display:flex;
justify-content:space-between;
}

#messages{
flex:1;
overflow:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:10px;
}

.message{
max-width:60%;
padding:10px;
border-radius:10px;
word-wrap:break-word;
}

.me{
align-self:flex-end;
background:#2563eb;
}

.other{
align-self:flex-start;
background:#374151;
}

.sender{
font-size:12px;
opacity:0.8;
margin-bottom:4px;
}

img{
max-width:250px;
border-radius:6px;
}

#inputArea{
display:flex;
gap:5px;
padding:10px;
background:#020617;
}

#msgInput{
flex:1;
padding:10px;
border:none;
border-radius:6px;
}

button{
padding:10px;
background:#2563eb;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="sidebar">

<h3>Your Code</h3>
<div id="myCodeBox"></div>

<button onclick="addContact()">Add Contact</button>

<h3>Contacts</h3>
<div id="contacts"></div>

</div>

<div id="chat">

<div class="chatHeader">
<span id="chatName">Select Chat</span>
</div>

<div id="messages"></div>

<div id="inputArea">
<input id="msgInput" placeholder="Type message">
<input type="file" id="imgUpload">
<button onclick="sendMessage()">Send</button>
</div>

</div>

<script>

const firebaseConfig={
apiKey:"AIzaSyBeQR-07p_gkN1ygr49rh-PSI-pRsdmoDw",
authDomain:"chat-82a4b.firebaseapp.com",
databaseURL:"https://chat-82a4b-default-rtdb.firebaseio.com",
projectId:"chat-82a4b"
}

firebase.initializeApp(firebaseConfig)

const auth=firebase.auth()
const db=firebase.database()

let uid
let myCode
let currentChat
let currentChatUid

auth.signInAnonymously()

Notification.requestPermission()

auth.onAuthStateChanged(async user=>{

uid=user.uid

let userRef=db.ref("users/"+uid)
let snap=await userRef.once("value")

if(!snap.exists()){

myCode=Math.floor(1000+Math.random()*9000).toString()

await userRef.set({code:myCode})

db.ref("codes/"+myCode).set(uid)

}else{
myCode=snap.val().code
}

document.getElementById("myCodeBox").innerText=myCode

loadContacts()

})

function addContact(){

let code=prompt("Enter their code")

if(!code) return

db.ref("codes/"+code).once("value").then(async snap=>{

if(!snap.exists()) return

let otherUid=snap.val()

await db.ref("contacts/"+uid+"/"+otherUid).set({
name:code,
id:code
})

await db.ref("contacts/"+otherUid+"/"+uid).set({
name:myCode,
id:myCode
})

})

}

function loadContacts(){

db.ref("contacts/"+uid).on("value",snap=>{

let list=document.getElementById("contacts")
list.innerHTML=""

snap.forEach(child=>{

let otherUid=child.key
let data=child.val()

let div=document.createElement("div")
div.className="contact"

let label=data.name+" ("+data.id+")"

let unread=document.createElement("span")
unread.className="unread"
unread.id="unread-"+otherUid
unread.style.display="none"

div.innerHTML="<span>"+label+"</span>"
div.appendChild(unread)

div.onclick=()=>openChat(otherUid,data)

list.appendChild(div)

watchUnread(otherUid)

})

})

}

function watchUnread(otherUid){

let chat=chatId(uid,otherUid)

db.ref("messages/"+chat).on("value",snap=>{

let count=0

snap.forEach(m=>{

let msg=m.val()

if(!msg.seenBy || !msg.seenBy[uid]){
if(msg.sender!==myCode) count++
}

})

let badge=document.getElementById("unread-"+otherUid)

if(!badge) return

if(count>0){
badge.style.display="inline"
badge.innerText=count
}else{
badge.style.display="none"
}

})

}

function chatId(a,b){

return[a,b].sort().join("_")

}

function openChat(otherUid,data){

currentChatUid=otherUid
currentChat=chatId(uid,otherUid)

document.getElementById("chatName").innerText=data.name+" ("+data.id+")"

loadMessages()

}

function loadMessages(){

db.ref("messages/"+currentChat).on("value",snap=>{

let box=document.getElementById("messages")
box.innerHTML=""

snap.forEach(child=>{

let m=child.val()

let div=document.createElement("div")

let mine=m.sender===myCode

div.className="message "+(mine?"me":"other")

let label=mine?"Me":m.senderName+" ("+m.senderId+")"

let content=""

if(m.type==="image"){
content=`<img src="${m.url}">`
}else{
content=m.text
}

div.innerHTML=`<div class="sender">${label}</div>${content}`

box.appendChild(div)

db.ref("messages/"+currentChat+"/"+child.key+"/seenBy/"+uid).set(true)

})

box.scrollTop=box.scrollHeight

})

}

function sendMessage(){

let input=document.getElementById("msgInput")

if(input.value==="") return

db.ref("messages/"+currentChat).push({
type:"text",
text:input.value,
sender:myCode,
senderName:"Me",
senderId:myCode,
time:Date.now()
})

input.value=""

}

imgUpload.onchange=e=>{

let file=e.target.files[0]
let reader=new FileReader()

reader.onload=()=>{

db.ref("messages/"+currentChat).push({
type:"image",
url:reader.result,
sender:myCode,
senderName:"Me",
senderId:myCode,
time:Date.now()
})

}

reader.readAsDataURL(file)

}

db.ref("messages").on("child_added",snap=>{

let chat=snap.key

snap.ref.limitToLast(1).on("child_added",msg=>{

let m=msg.val()

if(m.sender!==myCode){

new Notification("New Message",{
body:m.text || "Image"
})

}

})

})

document.getElementById("msgInput").addEventListener("keypress",e=>{
if(e.key==="Enter") sendMessage()
})

</script>

</body>
</html>
